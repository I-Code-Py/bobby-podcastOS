# Variante pour un hébergement Plesk.
#
# Différences avec docker-compose.yml :
#   - PAS de service Caddy : sur Plesk, c'est nginx (géré par Plesk) qui
#     détient les ports 80/443 et le certificat Let's Encrypt du domaine.
#   - L'app ne publie PAS 80/443, mais un port local (127.0.0.1:APP_PORT)
#     que tu relies au domaine depuis « Docker Proxy Rules » dans Plesk.
#   - uvicorn tourne déjà avec --proxy-headers (voir Dockerfile), donc il
#     respecte le HTTPS terminé par le nginx de Plesk (cookies Secure OK).

services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: ${TIMEZONE:-Europe/Paris}
    depends_on:
      db:
        condition: service_healthy
    # Publié uniquement sur la boucle locale : seul le nginx de Plesk
    # (même machine) peut l'atteindre, jamais l'Internet en direct.
    ports:
      - "127.0.0.1:${APP_PORT:-7000}:8000"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
