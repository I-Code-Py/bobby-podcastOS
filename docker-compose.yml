services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: podcastos
      POSTGRES_USER: podcast
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U podcast -d podcastos"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://podcast:${DB_PASSWORD:-changeme}@db:5432/podcastos
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123}
      SECURE_COOKIES: "true"
      INSTAGRAM_COOKIE_FILE: ${INSTAGRAM_COOKIE_FILE:-}
    volumes:
      - ${INSTAGRAM_COOKIE_FILE:-/dev/null}:${INSTAGRAM_COOKIE_FILE:-/dev/null}:ro
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
